version: "3.9"

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: crw_postgres
    environment:
      POSTGRES_USER: crw_user
      POSTGRES_PASSWORD: crw_password
      POSTGRES_DB: crw_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crw_user -d crw_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: crw_api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://crw_user:crw_password@db:5432/crw_dev
      ENVIRONMENT: development
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./apps/api:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    image: node:20-alpine
    container_name: crw_frontend
    working_dir: /app
    ports:
      - "3000:3000"
    volumes:
      - ./apps/web:/app
    command: sh -c "npm install && npm run dev"
    depends_on:
      - api

volumes:
  postgres_data:
